project:
  type: website
  output-dir: docs

website:
  title: "Rayne Aurit's Portfolio"
  favicon: "favicon.png"
  navbar:
    right:
      - gallery.qmd
      - ResumeModern/ResumeModern.qmd
      - about.qmd
      - icon: github
        href: https://github.com/raurit
      - icon: linkedin
        href: https://www.linkedin.com/in/rayne-aurit-08538a29a/

format:
  html:
    theme:
      - united
      - custom.scss
    css: styles.css
    format:
    include-after-body:
      - text: |
          <script>
          function getHeaderImageHeight() {
            const preferred = window.innerWidth * 0.30;
            const max = window.innerHeight * 0.25;
            return Math.min(Math.max(100, preferred), max);
          }
          function updateNavbarOnScroll() {
            const navbar = document.querySelector(".navbar");
            if (!navbar) return;
            const threshold = getHeaderImageHeight();
            if (window.scrollY > threshold) {
              navbar.classList.add("navbar-scrolled");
            } else {
              navbar.classList.remove("navbar-scrolled");
            }
          }
          document.addEventListener("scroll", updateNavbarOnScroll);
          window.addEventListener("resize", updateNavbarOnScroll);
          window.addEventListener("load", updateNavbarOnScroll);
          </script>



